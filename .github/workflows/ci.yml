name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run -s build

      - name: Lint
        run: npm run -s lint

      - name: Pricing consistency check
        run: npm run -s pricing:check

      - name: UI standards consistency check
        run: npm run -s ui:check

      - name: Test
        run: npm test -- --runInBand
